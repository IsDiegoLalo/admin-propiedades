version: '3.9'

# Perfil de tests: corre las suites de cada servicio en contenedores aislados
# Uso: docker-compose -f docker-compose.test.yml up --abort-on-container-exit

services:
  # ── Properties Service Tests ───────────────────────────────────────
  properties-test:
    build:
      context: ./services/properties
      dockerfile: Dockerfile
      target: test
    environment:
      NODE_ENV: test
      PORT: 3001
      POSTGRES_HOST: properties-test-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: properties_test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      MONGO_URI: mongodb://properties-test-mongo:27017/properties_test_docs
      REVIEWS_SERVICE_URL: http://reviews-test:3003
      PHOTO_MAX_SIZE_BYTES: 10485760
      LOG_LEVEL: error
    depends_on:
      properties-test-postgres:
        condition: service_healthy
      properties-test-mongo:
        condition: service_healthy
    networks:
      - test-network

  properties-test-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: properties_test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test_user -d properties_test_db']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test-network

  properties-test-mongo:
    image: mongo:7
    tmpfs:
      - /data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test-network

  # ── Reservations Service Tests ─────────────────────────────────────
  reservations-test:
    build:
      context: ./services/reservations
      dockerfile: Dockerfile
      target: test
    environment:
      NODE_ENV: test
      PORT: 3002
      POSTGRES_HOST: reservations-test-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: reservations_test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      PROPERTIES_SERVICE_URL: http://properties-test:3001
      PAYMENT_MOCK_FAILURE_RATE: 0
      LOG_LEVEL: error
    depends_on:
      reservations-test-postgres:
        condition: service_healthy
    networks:
      - test-network

  reservations-test-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reservations_test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test_user -d reservations_test_db']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test-network

  # ── Reviews Service Tests ──────────────────────────────────────────
  reviews-test:
    build:
      context: ./services/reviews
      dockerfile: Dockerfile
      target: test
    environment:
      NODE_ENV: test
      PORT: 3003
      POSTGRES_HOST: reviews-test-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: reviews_test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      LOG_LEVEL: error
    depends_on:
      reviews-test-postgres:
        condition: service_healthy
    networks:
      - test-network

  reviews-test-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reviews_test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test_user -d reviews_test_db']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
